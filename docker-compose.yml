version: '3.8'

services:
  # Servidor do Banco de Dados PostgreSQL Estável
  db:
    image: postgres:15-alpine
    container_name: lumini-postgres-db
    restart: always
    environment:
      POSTGRES_USER: lumini_crm
      POSTGRES_PASSWORD: LuminiSecurePassword2026_
      POSTGRES_DB: lumini_db
    # Não expomos a porta 5432 para o hospedeiro (host) para evitar conflitos na VPS se já houver um PostgreSQL rodando,
    # e também por motivos de segurança. A aplicação se comunica internamente dentro da rede do Docker na porta 5432.
    # Caso queira acessar o banco externamente da VPS, descomente a linha abaixo:
    # ports:
    #   - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumini_crm -d lumini_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Aplicação Full-Stack Node Express + React (Vite)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lumini-app-server
    restart: always
    ports:
      # Modificado para usar a variável APP_PORT ou padrão 3003 para evitar conflitos na VPS se a porta 3000 já estiver ocupada
      - "${APP_PORT:-3003}:3000"
    environment:
      - DATABASE_URL=postgresql://lumini_crm:LuminiSecurePassword2026_@db:5432/lumini_db
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Volume opcional para fallback JSON de segurança (em caso de reinício offline)
      - app_backup_data:/usr/src/app/data

volumes:
  postgres_data:
    driver: local
  app_backup_data:
    driver: local
